<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <!-- DNS prefetch for API and fonts -->
    <link rel="dns-prefetch" href="//fonts.googleapis.com" />
    <link rel="dns-prefetch" href="//fonts.gstatic.com" />
    <link rel="preconnect" href="https://fonts.googleapis.com" crossorigin />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='16' fill='%230052CC'/><rect x='12' y='20' width='30' height='60' rx='6' fill='white'/><rect x='58' y='20' width='30' height='38' rx='6' fill='white'/></svg>" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- SEO -->
    <title>Trello Clone — Kanban Board</title>
    <meta name="description" content="A full-featured Trello clone with drag-and-drop, dark mode, labels, checklists, due dates, and team collaboration." />
    <meta name="theme-color" content="#0052CC" />
    <!-- Open Graph -->
    <meta property="og:title" content="Trello Clone" />
    <meta property="og:description" content="Organize your work with kanban boards, cards, and checklists." />
    <meta property="og:type" content="website" />
    <!-- Prevent FOUC: apply saved theme before React loads -->
    <script>
      try {
        const t = localStorage.getItem('trello-theme');
        if (t === 'dark' || (!t && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
          document.documentElement.classList.add('dark');
        }
      } catch {}
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
